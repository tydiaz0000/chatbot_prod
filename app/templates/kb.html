<h1>KB: {{kb[1]}}</h1>

<div class="card">
<form method="post" action="/kb/{{kb[0]}}/chunk/add">
<input name="title" placeholder="Chunk title">
<textarea name="content" placeholder="Content"></textarea>
<button>Add Chunk</button>
</form>
</div>

{% for c in chunks %}
<div class="card">
<h3>{{c[2]}}</h3>
<p>{{c[3]}}</p>
</div>
{% endfor %}
