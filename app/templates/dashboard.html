<!DOCTYPE html>
<html>
<head>
<title>Chatbot Admin</title>
<style>
body {
  font-family: system-ui;
  background: #0b0f17;
  color: white;
  margin: 0;
  display: flex;
}

.sidebar {
  width: 250px;
  background: #111827;
  height: 100vh;
  padding: 20px;
}

.main {
  flex: 1;
  padding: 30px;
}

.card {
  background: #1f2937;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin</h2>
<a href="/admin">Dashboard</a>
</div>

<div class="main">

<h1>Knowledge Bases</h1>

<div class="card">
<form method="post" action="/kb/create">
<input name="name" placeholder="New KB Name">
<button>Create</button>
</form>
</div>

{% for kb in kbs %}
<div class="card">
<h3>{{kb[1]}}</h3>
<a href="/kb/{{kb[0]}}">Manage</a>
</div>
{% endfor %}

</div>
<script src="http://192.168.0.220:8090/static/widget.js"></script>
</body>
</html>
